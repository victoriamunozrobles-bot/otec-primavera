<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Ingresar Calificación - OTEC Primavera</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>
  <body
    class="d-flex align-items-center justify-content-center min-vh-100 py-5"
  >
    <div class="container" style="max-width: 500px">
      <div class="card card-dark shadow-lg p-4 rounded-4 border-secondary">
        <div class="text-center mb-4 border-bottom border-secondary pb-3">
          <h3 class="text-pastel-green">Registro de Evaluación</h3>
          <p
            class="text-light mb-0"
            th:text="${evaluacion.estudiante.nombre}"
          ></p>
          <small
            class="text-muted-green"
            th:text="${evaluacion.modulo.titulo}"
          ></small>
        </div>

        <form
          th:action="@{/evaluaciones/guardar}"
          th:object="${evaluacion}"
          method="POST"
          class="needs-validation"
          novalidate
        >
          <input type="hidden" th:field="*{idEvaluacion}" />
          <input type="hidden" th:field="*{estudiante.idEstudiante}" />
          <input type="hidden" th:field="*{modulo.idModulo}" />

          <div class="mb-4 text-center">
            <label class="form-label fw-bold d-block text-pastel-green"
              >Calificación Final</label
            >
            <input
              type="number"
              th:field="*{nota}"
              class="form-control text-center fs-3 fw-bold mx-auto"
              style="max-width: 150px; background-color: #1a1d20"
              placeholder="7.0"
              step="0.1"
              min="1.0"
              max="7.0"
              required
            />
            <div class="invalid-feedback">
              Ingresa una nota válida (1.0 a 7.0).
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold"
              >Retroalimentación / Comentarios</label
            >
            <textarea
              th:field="*{observaciones}"
              class="form-control"
              rows="4"
              placeholder="Observaciones sobre el desempeño del estudiante..."
              required
            ></textarea>
            <div class="invalid-feedback">
              Debes incluir un comentario de retroalimentación.
            </div>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-pastel-green flex-grow-1 py-2">
              💾 Registrar Nota
            </button>
            <a
              th:href="@{/evaluaciones/estudiante/{id}(id=${evaluacion.estudiante.idEstudiante})}"
              class="btn btn-outline-secondary py-2 px-4"
              >Cancelar</a
            >
          </div>
        </form>
      </div>
    </div>

    <script>
      (() => {
        "use strict";
        const forms = document.querySelectorAll(".needs-validation");
        Array.from(forms).forEach((form) => {
          form.addEventListener(
            "submit",
            (event) => {
              if (!form.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
              }
              form.classList.add("was-validated");
            },
            false,
          );
        });
      })();
    </script>
  </body>
</html>
