<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Ingreso - OTEC Primavera</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>
  <body class="d-flex align-items-center justify-content-center vh-100">
    <div class="container" style="max-width: 400px">
      <div class="card card-dark shadow-lg p-4 rounded-4">
        <div class="text-center mb-4">
          <h2 class="text-pastel-green">OTEC Primavera</h2>
          <p class="text-muted-green">Portal Académico</p>
        </div>

        <div
          th:if="${param.error}"
          class="alert alert-danger py-2 text-center"
          role="alert"
        >
          Credenciales inválidas.
        </div>

        <div
          th:if="${param.exito}"
          class="alert alert-success py-2 text-center"
          style="background-color: #a8e6cf; color: #1a1a1a; border: none"
          role="alert"
        >
          ¡Registro exitoso! Ya puedes ingresar.
        </div>

        <form th:action="@{/login}" method="POST">
          <div class="mb-3">
            <label class="form-label">Usuario (Email o RUT)</label>
            <input
              type="text"
              name="username"
              class="form-control"
              placeholder="Ingresa tu usuario"
              required
              autofocus
            />
          </div>
          <div class="mb-4">
            <label class="form-label">Contraseña</label>
            <input
              type="password"
              name="password"
              class="form-control"
              placeholder="••••••••"
              required
            />
          </div>
          <button
            class="btn btn-pastel-green w-100 rounded-3 py-2"
            type="submit"
          >
            Iniciar Sesión
          </button>
        </form>

        <hr class="border-secondary my-4" />

        <div class="text-center">
          <p class="mb-1 text-muted-green">¿Eres un estudiante nuevo?</p>
          <a
            th:href="@{/registro}"
            class="text-pastel-green text-decoration-none fw-bold"
            >Matricularme aquí</a
          >
        </div>
      </div>
    </div>
  </body>
</html>
