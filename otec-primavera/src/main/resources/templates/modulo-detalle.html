<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Detalle de Unidad - OTEC Primavera</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>
  <body class="d-flex flex-column min-vh-100 p-4">
    <div class="container" style="max-width: 900px">
      <div class="mb-4">
        <a
          th:href="@{/mi-portal}"
          class="text-muted-green text-decoration-none fw-bold"
          >← Volver a Mi Portal</a
        >
      </div>

      <div class="card card-dark shadow-sm rounded-4 p-4 mb-4 border-secondary">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <span
              class="badge bg-secondary mb-2"
              th:text="${modulo.curso.nombre}"
            ></span>
            <h2 class="text-pastel-green mb-3" th:text="${modulo.titulo}"></h2>
            <p class="text-light fs-5 mb-0" th:text="${modulo.descripcion}"></p>
          </div>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-md-7">
          <div
            class="card card-dark shadow-sm rounded-4 p-4 h-100 border-secondary"
          >
            <h4
              class="text-pastel-green border-bottom border-secondary pb-3 mb-4"
            >
              📎 Material de Estudio
            </h4>

            <div
              class="alert bg-black border-secondary text-muted-green text-center py-4"
            >
              <span style="font-size: 2rem; display: block; margin-bottom: 10px"
                >📂</span
              >
              <em
                >Los documentos y recursos de esta unidad pronto estarán
                disponibles para descarga.</em
              >
            </div>
          </div>
        </div>

        <div class="col-md-5">
          <div
            class="card card-dark shadow-sm rounded-4 p-4 h-100 border-secondary"
          >
            <h4
              class="text-pastel-green border-bottom border-secondary pb-3 mb-4"
            >
              📝 Mi Evaluación
            </h4>

            <div th:if="${miNota != null}" class="text-center">
              <span class="d-block text-muted-green mb-2"
                >Calificación Obtenida</span
              >

              <div
                class="d-inline-block rounded-circle d-flex align-items-center justify-content-center mx-auto mb-4"
                style="width: 100px; height: 100px; background-color: #000"
                th:styleappend="${miNota.nota >= 4.0 ? 'border: 4px solid #a8e6cf;' : 'border: 4px solid #dc3545;'}"
              >
                <span
                  class="fs-1 fw-bold"
                  th:classappend="${miNota.nota >= 4.0 ? 'text-pastel-green' : 'text-danger'}"
                  th:text="${#numbers.formatDecimal(miNota.nota, 1, 1)}"
                >
                </span>
              </div>

              <div class="text-start bg-black p-3 rounded-3">
                <small class="text-muted-green d-block fw-bold mb-1"
                  >Comentarios del Docente:</small
                >
                <span
                  class="text-light fst-italic"
                  th:text="${miNota.observaciones}"
                ></span>
              </div>
            </div>

            <div th:if="${miNota == null}" class="text-center py-4">
              <span style="font-size: 3rem; display: block; margin-bottom: 15px"
                >⏳</span
              >
              <h5 class="text-light">Unidad en curso</h5>
              <p class="text-muted-green">
                Aún no tienes calificaciones registradas en este módulo.
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
