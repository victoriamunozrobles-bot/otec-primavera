<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <title>Gestión de Estudiantes - OTEC Primavera</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>
  <body class="d-flex flex-column min-vh-100 p-4">
    <div class="container">
      <div
        class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom border-secondary"
      >
        <h2 class="text-pastel-green">Directorio de Estudiantes</h2>

        <div class="d-flex align-items-center gap-3">
          <span class="text-muted"
            >Hola, <strong sec:authentication="name">Usuario</strong></span
          >
          <form th:action="@{/logout}" method="POST">
            <button type="submit" class="btn btn-outline-danger btn-sm">
              Cerrar Sesión
            </button>
          </form>
        </div>
      </div>

      <div class="mb-4">
        <a th:href="@{/cursos}" class="btn btn-outline-light"
          >📚 Volver al Catálogo de Cursos</a
        >
      </div>

      <div class="card card-dark shadow-sm rounded-4 overflow-hidden">
        <div class="table-responsive">
          <table class="table table-dark table-hover mb-0">
            <thead style="background-color: #1a1d20">
              <tr>
                <th class="py-3 px-4 text-pastel-green">RUT</th>
                <th class="py-3 px-4 text-pastel-green">Nombre Completo</th>
                <th class="py-3 px-4 text-pastel-green">Email</th>
                <th class="py-3 px-4 text-pastel-green text-center">
                  Estado Académico
                </th>
                <th class="py-3 px-4 text-pastel-green text-center">Gestión</th>
              </tr>
            </thead>
            <tbody>
              <tr th:if="${#lists.isEmpty(estudiantes)}">
                <td colspan="5" class="text-center py-4 text-muted-green">
                  Aún no hay estudiantes registrados en el sistema.
                </td>
              </tr>

              <tr th:each="e : ${estudiantes}">
                <td
                  class="py-3 px-4 fw-bold text-light"
                  th:text="${e.rut}"
                ></td>
                <td class="py-3 px-4" th:text="${e.nombre}"></td>
                <td
                  class="py-3 px-4 text-muted-green"
                  th:text="${e.email}"
                ></td>

                <td class="py-3 px-4 text-center">
                  <span
                    th:if="${e.curso != null}"
                    class="badge text-dark"
                    style="background-color: #a8e6cf !important"
                    th:text="${e.curso.nombre}"
                  ></span>
                  <span
                    th:unless="${e.curso != null}"
                    class="badge bg-warning text-dark"
                    >Pendiente de Asignación</span
                  >
                </td>

                <td class="py-3 px-4 text-center">
                  <a
                    href="#"
                    class="btn btn-sm btn-outline-info"
                    title="Asignar Curso"
                    >🎓 Matricular</a
                  >
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
