<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Registro Estudiante - OTEC Primavera</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>
  <body
    class="d-flex align-items-center justify-content-center min-vh-100 py-4"
  >
    <div class="container" style="max-width: 500px">
      <div class="card card-dark shadow-lg p-4 rounded-4">
        <div class="text-center mb-4">
          <h3 class="mb-1 text-pastel-green">Ficha de Matrícula</h3>
          <p class="text-muted">Crea tu cuenta académica</p>
        </div>

        <div
          th:if="${param.error == 'passwords'}"
          class="alert alert-warning py-2 text-center"
          role="alert"
        >
          Las contraseñas no coinciden. Inténtalo nuevamente.
        </div>

        <form th:action="@{/registro}" th:object="${registroDTO}" method="POST">
          <div class="mb-3">
            <label class="form-label">Nombre Completo</label>
            <input
              type="text"
              th:field="*{nombreCompleto}"
              class="form-control"
              placeholder="Ej. Ana Pérez González"
              required
            />
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">RUT</label>
              <input
                type="text"
                th:field="*{rut}"
                class="form-control"
                placeholder="12345678-9"
                required
              />
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Email</label>
              <input
                type="email"
                th:field="*{email}"
                class="form-control"
                placeholder="correo@ejemplo.com"
                required
              />
              <div class="form-text text-secondary" style="font-size: 0.8rem">
                Será tu usuario de acceso.
              </div>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input
              type="password"
              th:field="*{password}"
              class="form-control"
              placeholder="••••••••"
              required
            />
          </div>

          <div class="mb-4">
            <label class="form-label">Repetir Contraseña</label>
            <input
              type="password"
              th:field="*{repetirPassword}"
              class="form-control"
              placeholder="••••••••"
              required
            />
          </div>

          <button
            type="submit"
            class="btn btn-pastel-green w-100 rounded-3 py-2 mt-2"
          >
            Completar Registro
          </button>
        </form>

        <div class="text-center mt-4">
          <a th:href="@{/login}" class="text-muted text-decoration-none"
            >← Volver al inicio de sesión</a
          >
        </div>
      </div>
    </div>
  </body>
</html>
