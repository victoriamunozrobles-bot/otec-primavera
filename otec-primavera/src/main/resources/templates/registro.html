<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Registro Estudiante - OTEC Primavera</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>
  <body class="d-flex align-items-center justify-content-center vh-100">
    <div class="container" style="max-width: 450px">
      <div class="card card-dark shadow-lg p-4 rounded-4">
        <div class="text-center mb-4">
          <h3 class="mb-1" style="color: #a8e6cf">Ficha de Matrícula</h3>
          <p class="text-muted">Crea tu cuenta de estudiante</p>
        </div>

        <form th:action="@{/registro}" th:object="${usuario}" method="POST">
          <div class="mb-3">
            <label class="form-label">Identificador (RUT o Email)</label>
            <input
              type="text"
              th:field="*{username}"
              class="form-control"
              placeholder="ejemplo@correo.com"
              required
            />
            <div class="form-text text-secondary">
              Este será tu nombre de usuario para ingresar.
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label">Crea una contraseña segura</label>
            <input
              type="password"
              th:field="*{password}"
              class="form-control"
              placeholder="••••••••"
              required
            />
          </div>

          <button
            type="submit"
            class="btn btn-pastel-green w-100 rounded-3 py-2"
          >
            Completar Registro
          </button>
        </form>

        <div class="text-center mt-4">
          <a th:href="@{/login}" class="text-muted text-decoration-none"
            >← Volver al inicio de sesión</a
          >
        </div>
      </div>
    </div>
  </body>
</html>
