<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Matrícula - OTEC Primavera</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>
  <body
    class="d-flex align-items-center justify-content-center min-vh-100 py-5"
  >
    <div class="container" style="max-width: 550px">
      <div class="card card-dark shadow-lg p-4 rounded-4 border-secondary">
        <div class="text-center mb-4 border-bottom border-secondary pb-3">
          <h3 class="text-pastel-green">Proceso de Matrícula</h3>
          <p class="text-muted">Asignación de programa académico</p>
        </div>

        <form
          th:action="@{/estudiantes/matricular/{id}(id=${estudiante.idEstudiante})}"
          method="POST"
        >
          <div class="mb-3">
            <label class="form-label fw-bold">Estudiante</label>
            <input
              type="text"
              class="form-control bg-dark text-secondary"
              th:value="${estudiante.nombre} + ' (RUT: ' + ${estudiante.rut} + ')'"
              readonly
            />
          </div>

          <div class="mb-4 mt-4">
            <label class="form-label fw-bold text-pastel-green"
              >Seleccionar Programa:</label
            >
            <select name="cursoId" class="form-select form-control text-light">
              <option value="">-- Sin curso asignado (Desmatricular) --</option>

              <option
                th:each="c : ${listaCursos}"
                th:value="${c.idCurso}"
                th:text="${c.codigo} + ' - ' + ${c.nombre}"
                th:selected="${estudiante.curso != null and estudiante.curso.idCurso == c.idCurso}"
              ></option>
            </select>
            <div class="form-text text-secondary mt-2">
              El estudiante solo puede cursar un programa a la vez. Al
              seleccionar uno nuevo, se reemplazará el anterior.
            </div>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-pastel-green flex-grow-1 py-2">
              💾 Confirmar Matrícula
            </button>
            <a
              th:href="@{/estudiantes}"
              class="btn btn-outline-secondary py-2 px-4"
              >Cancelar</a
            >
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
