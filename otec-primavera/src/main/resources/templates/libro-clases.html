<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Libro de Clases - OTEC Primavera</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>
  <body class="d-flex flex-column min-vh-100 p-4">
    <div class="container-fluid" style="max-width: 1200px">
      <div class="mb-4">
        <a
          th:href="@{/cursos/detalle/{id}(id=${curso.idCurso})}"
          class="text-muted-green text-decoration-none fw-bold"
          >← Volver a la Ficha del Curso</a
        >
      </div>

      <div
        class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary"
      >
        <div>
          <h2 class="text-pastel-green mb-0">Libro de Clases Oficial</h2>
          <p class="text-light mb-0 fs-5" th:text="${curso.nombre}"></p>
        </div>
      </div>

      <div class="card card-dark shadow-sm rounded-4 p-4">
        <div class="table-responsive">
          <table
            class="table table-dark table-hover table-bordered border-secondary mb-0"
          >
            <thead style="background-color: #1a1d20">
              <tr>
                <th class="text-pastel-green py-3 fs-5">
                  Alumnos Matriculados
                </th>
                <th:block th:if="${not #lists.isEmpty(curso.modulos)}">
                  <th
                    th:each="mod : ${curso.modulos}"
                    class="text-center text-muted-green py-3"
                    th:text="${mod.titulo}"
                    style="min-width: 150px"
                  ></th>
                </th:block>
                <th:block th:if="${#lists.isEmpty(curso.modulos)}">
                  <th class="text-center text-muted-green py-3">
                    Sin unidades registradas
                  </th>
                </th:block>
              </tr>
            </thead>
            <tbody>
              <tr th:each="est : ${alumnosMatriculados}">
                <td
                  class="fw-bold align-middle text-light fs-5"
                  th:text="${est.nombre}"
                ></td>

                <th:block th:if="${not #lists.isEmpty(curso.modulos)}">
                  <td
                    th:each="mod : ${curso.modulos}"
                    class="text-center align-middle bg-black"
                    style="padding: 0; height: 60px"
                  >
                    <div
                      th:with="clave=${est.idEstudiante + '_' + mod.idModulo}"
                      class="w-100 h-100"
                    >
                      <div
                        th:if="${notasTexto.get(clave) == null}"
                        class="d-flex align-items-center justify-content-center w-100 h-100"
                      >
                        <a
                          th:href="@{/evaluaciones/calificar/{idEst}/{idMod}(idEst=${est.idEstudiante}, idMod=${mod.idModulo})}"
                          class="btn btn-outline-secondary w-100 h-100 d-flex align-items-center justify-content-center rounded-0 border-0"
                        >
                          + Evaluar
                        </a>
                      </div>

                      <div
                        th:if="${notasTexto.get(clave) != null}"
                        class="d-flex align-items-center justify-content-center w-100 h-100"
                      >
                        <a
                          th:href="@{/evaluaciones/calificar/{idEst}/{idMod}(idEst=${est.idEstudiante}, idMod=${mod.idModulo})}"
                          class="fw-bold fs-4 text-decoration-none d-flex align-items-center justify-content-center w-100 h-100"
                          th:classappend="${notasColor.get(clave)}"
                          th:text="${notasTexto.get(clave)}"
                        >
                        </a>
                      </div>
                    </div>
                  </td>
                </th:block>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
