<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Gestión de Módulo - OTEC Primavera</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>
  <body
    class="d-flex align-items-center justify-content-center min-vh-100 py-5"
  >
    <div class="container" style="max-width: 600px">
      <div class="card card-dark shadow-lg p-4 rounded-4 border-secondary">
        <div class="text-center mb-4 border-bottom border-secondary pb-3">
          <h3
            class="text-pastel-green"
            th:text="${modulo.idModulo == null ? 'Añadir Nueva Unidad' : 'Editar Unidad'}"
          ></h3>
          <p
            class="text-muted-green"
            th:text="'Para el programa: ' + ${modulo.curso.nombre}"
          ></p>
        </div>

        <form
          th:action="@{/modulos/guardar}"
          th:object="${modulo}"
          method="POST"
          class="needs-validation"
          novalidate
        >
          <input type="hidden" th:field="*{idModulo}" />
          <input type="hidden" th:field="*{curso.idCurso}" />

          <div class="mb-3">
            <label class="form-label fw-bold">Título de la Unidad</label>
            <input
              type="text"
              th:field="*{titulo}"
              class="form-control"
              placeholder="Ej: Unidad 1: Introducción"
              required
            />
            <div class="invalid-feedback">Debes ingresar un título.</div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold">Descripción / Contenido</label>
            <textarea
              th:field="*{descripcion}"
              class="form-control"
              rows="4"
              placeholder="Detalla los temas que se abordarán en esta unidad..."
              required
            ></textarea>
            <div class="invalid-feedback">La descripción es obligatoria.</div>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-pastel-green flex-grow-1 py-2">
              💾 Guardar Unidad
            </button>
            <a
              th:href="@{/cursos/detalle/{id}(id=${modulo.curso.idCurso})}"
              class="btn btn-outline-secondary py-2 px-4"
              >Cancelar</a
            >
          </div>
        </form>
      </div>
    </div>

    <script>
      (() => {
        "use strict";
        const forms = document.querySelectorAll(".needs-validation");
        Array.from(forms).forEach((form) => {
          form.addEventListener(
            "submit",
            (event) => {
              if (!form.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
              }
              form.classList.add("was-validated");
            },
            false,
          );
        });
      })();
    </script>
  </body>
</html>
