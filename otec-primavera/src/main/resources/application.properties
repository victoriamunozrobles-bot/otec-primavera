spring.application.name=otec-primavera

# La ruta a la base de datos
spring.datasource.url=jdbc:mariadb://localhost:3306/otec_primavera_db?createDatabaseIfNotExist=true

# Tus credenciales (recuerda poner las tuyas reales)
spring.datasource.username=app_user
spring.datasource.password=123456

# --- LAS DOS LÍNEAS NUEVAS ---
# 1. Le decimos exactamente el nombre de la furgoneta
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
# 2. Le decimos el idioma exacto para que no tenga que adivinarlo
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Las reglas del contratista
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true